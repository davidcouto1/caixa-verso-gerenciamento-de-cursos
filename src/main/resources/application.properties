# Forçar SameSite=None e Secure no cookie de sessão para proxy reverso
server.servlet.session.cookie.same-site=None
server.servlet.session.cookie.secure=true

# Spring Session JDBC
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always
# Configurações do Servidor
spring.application.name=sistema-gerenciamento-cursos
server.port=8080

# Configurações do Banco de Dados PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/gerenciamento_cursos}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

# Configurações do JPA/Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Console H2 desabilitado
spring.h2.console.enabled=false

# Configurações de Logging
logging.level.root=INFO
logging.level.com.gerenciamento.cursos=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# include requestId and INSTANCE_ID from MDC/env in log output
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [instance:%X{INSTANCE_ID}] [%X{requestId}] %-5level %logger{36} - %msg%n

# Configurações de JSON
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

# Actuator endpoints (expor health e info)
management.endpoints.web.exposure.include=health,info
