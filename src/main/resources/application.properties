# Forçar SameSite=None e Secure no cookie de sessão para proxy reverso
server.servlet.session.cookie.same-site=None
server.servlet.session.cookie.secure=true
# Configurações do Servidor
spring.application.name=sistema-gerenciamento-cursos
server.port=8080

# Configurações do Banco de Dados H2 (em memória)
spring.datasource.url=jdbc:h2:mem:gerenciamento_cursos
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Configurações do JPA/Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Console H2 (para acessar via navegador)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Configurações de Logging
logging.level.root=INFO
logging.level.com.gerenciamento.cursos=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# include requestId from MDC in log output
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%X{requestId}] %-5level %logger{36} - %msg%n

# Configurações de JSON
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

# Actuator endpoints (expor health e info)
management.endpoints.web.exposure.include=health,info
