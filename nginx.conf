# configuração básica de proxy reverso
# direciona todas as requisições para a aplicação Spring Boot

events {}

http {
    # permite que o Nginx resolva nomes de serviço via DNS interno do Docker
    resolver 127.0.0.11 valid=30s;

    upstream backend {
        # o Docker DNS retorna múltiplos IPs ao escalar o serviço
        server app:8080 max_fails=3 fail_timeout=30s;
        # para replicar, execute 'docker-compose up --scale app=3'
        # em execução local sem Docker, altere para localhost:8080
        # server localhost:8080;
    }

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # cache de recursos estáticos (opcional)
        location ~* \.(css|js|png|jpg|jpeg|gif|ico)$ {
            expires 1d;
            access_log off;
        }
    }
}
