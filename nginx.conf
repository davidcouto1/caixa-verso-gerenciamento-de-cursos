# configuração básica de proxy reverso
# direciona todas as requisições para a aplicação Spring Boot

events {}

http {
    upstream backend {
        # quando estiver usando Docker Compose, o nome do serviço é 'app'
        server app:8080;
        # em execução local sem Docker, altere para localhost:8080
        # server localhost:8080;
    }

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # cache de recursos estáticos (opcional)
        location ~* \.(css|js|png|jpg|jpeg|gif|ico)$ {
            expires 1d;
            access_log off;
        }
    }
}
