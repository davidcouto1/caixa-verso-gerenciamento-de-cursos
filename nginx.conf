# Nginx configuration used in projeto de gerenciamento de cursos.
# Serve como reverse proxy, load balancer e camada de infraestrutura
# para segurança, cache, compressão, rate-limiting e outras funcionalidades.
# Comentários indicam requisitos implementados (obrigatórios, intermediários e opcionais).

# configuração básica de proxy reverso
# direciona todas as requisições para a aplicação Spring Boot

events {}

http {
    # permite que o Nginx resolva nomes de serviço via DNS interno do Docker
    resolver 127.0.0.11 valid=30s;

    # compressão gzip para melhorar performance
    gzip on;
    gzip_types application/json text/plain;
    gzip_proxied any;
    gzip_min_length 1000;
    gzip_comp_level 5;

    # rate limiting: 5req/s por IP, burst até 10
    limit_req_zone $binary_remote_addr zone=perip:10m rate=5r/s;

    # cache de respostas GET (10 segundos)
    proxy_cache_path /tmp/nginx-cache levels=1:2 keys_zone=mycache:10m inactive=60s max_size=50m;

    upstream backend {
        # o Docker DNS retorna múltiplos IPs ao escalar o serviço
        server app:8080 max_fails=3 fail_timeout=30s;
        # para replicar, execute 'docker-compose up --scale app=3'
        # em execução local sem Docker, altere para localhost:8080
        # server localhost:8080;
    }

    # custom log format captures key request info and upstream timing
    log_format main '$remote_addr - [$time_local] '
                    '"$request_method $request" '
                    'status:$status '
                    'request_id:$request_id '
                    'upstream:$upstream_addr '
                    'utime:$upstream_response_time';
    access_log /var/log/nginx/access.log main;

    server {
        # expose proxy on both 80 (default HTTP) and 8080 so that the
        # single-page app's hard‑coded API_URL (http://localhost:8080/api)
        # continues to work. requests to :8080 still hit nginx, not the
        # backend container, respecting the rule that the API port is never
        # directly bound to the host.
        listen 80;
        listen 8080;
        server_name localhost;

        # custom error pages
        error_page 404 /custom_404.html;
        error_page 500 502 503 504 /custom_50x.html;
        location = /custom_404.html { root /etc/nginx/errors; internal; }
        location = /custom_50x.html { root /etc/nginx/errors; internal; }

        # block large payloads (max 1 megabyte)
        client_max_body_size 1m;

        # security headers for all responses
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        add_header X-XSS-Protection "1; mode=block";

        location / {
            limit_req zone=perip burst=10 nodelay;
            proxy_cache mycache;
            proxy_cache_valid 200 3s;
            proxy_cache_methods GET HEAD;
            # do not cache responses for authenticated sessions; when the
            # JSESSIONID cookie is present we want fresh data and we must
            # also avoid returning cached 401/redirect from /api/auth/me.
            proxy_cache_bypass $cookie_JSESSIONID;
            proxy_no_cache $cookie_JSESSIONID;

            proxy_pass http://backend;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
              proxy_set_header X-Upstream-Addr $upstream_addr;
              proxy_set_header X-Request-ID $request_id;
              proxy_set_header Cookie $http_cookie;
              add_header X-Cache-Status $upstream_cache_status;
        }

        # proteção básica para swagger e actuator
        location ^~ /swagger {
            auth_basic "Restricted";
            auth_basic_user_file /etc/nginx/.htpasswd;
            proxy_cache mycache;
            proxy_cache_valid 200 3s;
            proxy_cache_methods GET HEAD;
            proxy_pass http://backend/swagger;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Upstream-Addr $upstream_addr;
            proxy_set_header X-Request-ID $request_id;
            add_header X-Cache-Status $upstream_cache_status;
        }

        location ^~ /actuator {
            auth_basic "Restricted";
            auth_basic_user_file /etc/nginx/.htpasswd;
            proxy_cache mycache;
            proxy_cache_valid 200 3s;
            proxy_cache_methods GET HEAD;
            proxy_pass http://backend/actuator;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Upstream-Addr $upstream_addr;
            proxy_set_header X-Request-ID $request_id;
            add_header X-Cache-Status $upstream_cache_status;
        }

        # cache de recursos estáticos (opcional)
        # esta diretiva interceptava pedidos de css/js antes de enviá-los
        # para a aplicação, mas não definia `root` nem `proxy_pass`, o que
        # fazia o Nginx responder 404 e deixava o front‑end desconfigurado
        # após o login (quando a página principal é carregada).
        # corrigimos enviando também esses pedidos para o backend e
        # mantendo um `expires` para caching no proxy.
        location ~* \.(css|js|png|jpg|jpeg|gif|ico)$ {
            expires 1d;
            access_log off;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Upstream-Addr $upstream_addr;
            proxy_set_header X-Request-ID $request_id;
            add_header X-Cache-Status $upstream_cache_status;
        }
    }
}
