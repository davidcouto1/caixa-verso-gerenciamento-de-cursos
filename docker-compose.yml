version: '3.8'

services:
  app:
    build: .
    # porta 8080 **não é exposta** ao host; o serviço é acessível
    # apenas via rede Docker pelo Nginx.
    #ports:
    #  - "8080:8080"
    # variável de ambiente para produção (exemplos)
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
  nginx:
    image: nginx:stable
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx.htpasswd:/etc/nginx/.htpasswd:ro
      - ./custom_404.html:/etc/nginx/errors/custom_404.html:ro
      - ./custom_50x.html:/etc/nginx/errors/custom_50x.html:ro
    depends_on:
      - app
