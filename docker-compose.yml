version: '3.8'

services:
  app:
    build: .
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - INSTANCE_ID=${INSTANCE_ID:-${HOSTNAME}}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/gerenciamento_cursos
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: gerenciamento_cursos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
  nginx:
    image: nginx:stable
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx.htpasswd:/etc/nginx/.htpasswd:ro
      - ./custom_404.html:/etc/nginx/errors/custom_404.html:ro
      - ./custom_50x.html:/etc/nginx/errors/custom_50x.html:ro
    depends_on:
      - app

volumes:
  pgdata:
    driver: local
