version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    # variável de ambiente para produção (exemplos)
    environment:
      - SPRING_PROFILES_ACTIVE=prod
  nginx:
    image: nginx:stable
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
